<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Card — NEXT Swimming School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600&family=Barlow+Semi+Condensed:ital,wght@0,400;0,500;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#155689;           /* warna utama */
    --ink:#141414;            /* warna teks */
    --bw:1.4px;               /* tebal garis tabel */
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  body{
    background:#9aa2ab;
    font-family:'Poppins', Arial, sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:24px 0;
  }

  /* ===================== HALAMAN (A4) ===================== */
  .page{
    position:relative;
    width:794px;
    height:1123px;
    background:#fff;
    overflow:hidden;
    box-shadow:0 4px 24px rgba(0,0,0,.25);
  }

  /* ---------- dekorasi ---------- */
  .deco-arcs{ position:absolute; top:0; right:0; width:330px; height:345px; pointer-events:none; }
  .deco-dots{ position:absolute; left:0; bottom:0; width:470px; height:150px; pointer-events:none; }
  .watermark{
    position:absolute; top:50%; left:50%;
    width:430px; height:430px;
    transform:translate(-50%,-50%);
    object-fit:contain;
    opacity:.07;
    pointer-events:none;
    display:none;               /* tampil otomatis jika logo diisi */
  }

  .content{ position:relative; z-index:1; }

  /* ===================== HEADER ===================== */
  .header{ position:relative; height:122px; padding:0 70px; }
  .title{
    font-family:'Anton', 'Arial Narrow', Impact, sans-serif;
    font-size:48px;
    line-height:1;
    padding-top:33px;
    letter-spacing:0;
    color:var(--blue);
  }
  .periode{
    margin-top:7px;
    font-weight:600;
    font-size:13.5px;
    letter-spacing:.4px;
    color:var(--blue);
    text-transform:uppercase;
  }
  .logo-box{
    position:absolute;
    top:0; right:21px;
    width:253px; height:130px;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .logo-box img{ max-width:88%; max-height:78%; object-fit:contain; }
  .logo-placeholder{
    color:#777; font-size:12px; letter-spacing:1px;
    border:1px dashed #555; border-radius:8px; padding:28px 52px;
  }

  /* ===================== DATA SISWA ===================== */
  .student{ position:relative; height:175px; }
  .photo-box{
    position:absolute; left:72px; top:0;
    width:158px; height:155px;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .photo-box img{ width:100%; height:100%; object-fit:cover; }
  .photo-placeholder{
    color:#777; font-size:11px; letter-spacing:1px;
    border:1px dashed #555; border-radius:6px; padding:26px 18px;
  }
  .info-table{ position:absolute; left:273px; top:-2px; border-collapse:collapse; }
  .info-table td{
    font-size:18px;
    letter-spacing:.2px;
    padding:0;
    height:26.5px;
    text-transform:uppercase;
    vertical-align:middle;
    line-height:1;
    white-space:nowrap;
  }
  .info-table td.lbl{ width:172px; }
  .info-table td.val::before{ content:": "; }

  /* ===================== TABEL ===================== */
  .band{ padding:0 70px; width:100%; }

  table.grid{ width:100%; border-collapse:collapse; table-layout:fixed; }
  table.grid th, table.grid td{
    border:var(--bw) solid var(--blue);
    text-align:center;
    letter-spacing:.2px;
  }
  table.grid th{
    background:var(--blue);
    color:#fff;
    font-weight:600;
    font-size:16.5px;
  }
  table.grid td{ font-size:17px; font-weight:400; text-transform:uppercase; }

  .skill-table th{ height:40px; }
  .skill-table td{ height:38px; }
  .skill-table col.c-skill{ width:74%; }
  .skill-table col.c-criteria{ width:26%; }

  .section-title{
    font-family:'Anton', 'Arial Narrow', Impact, sans-serif;
    font-size:24px;
    letter-spacing:.2px;
    color:var(--blue);
    margin:17px 0 11px;
  }
  .pbt-table th{ height:33px; }
  .pbt-table td{ height:36.5px; }
  .pbt-table col.c-style{ width:41.2%; }
  .pbt-table col.c-time{ width:19.6%; }

  /* ===================== NOTE ===================== */
  .note-label{
    font-family:'Barlow Semi Condensed', Arial, sans-serif;
    font-style:italic;
    font-weight:500;
    font-size:16px;
    margin:8px 0 5px;
    letter-spacing:.3px;
  }
  .note-box{
    border:var(--bw) solid var(--blue);
    border-radius:9px;
    height:68px;
    padding:8px 12px;
    font-size:15px;
    font-family:'Barlow Semi Condensed', Arial, sans-serif;
    font-style:italic;
    overflow:hidden;
  }

  /* ===================== STATISTIK ===================== */
  .stats{ display:flex; padding:13px 70px 0 73px; }
  .stats .col{ flex:1; }
  .stat-row{ display:flex; margin-bottom:7px; align-items:baseline; }
  .stat-row .k{ font-size:16.5px; flex:0 0 132px; }
  .stats .col.right .stat-row .k{ flex-basis:203px; }
  .stat-row .v{
    font-family:'Barlow Semi Condensed', Arial, sans-serif;
    font-style:italic;
    font-weight:500;
    font-size:17.5px;
  }

  /* ===================== TANDA TANGAN ===================== */
  .signatures{ position:relative; height:130px; }
  .sig-block{ position:absolute; text-align:center; }
  .sig-block.one{ left:145px; width:166px; }
  .sig-block.two{ left:462px; width:166px; }
  .sig-space{
    height:80px;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .sig-space img{ max-height:78px; max-width:150px; object-fit:contain; }
  .sig-name{
    font-family:'Barlow Semi Condensed', Arial, sans-serif;
    font-style:italic; font-weight:500;
    font-size:14.5px;
    padding-bottom:2px;
  }
  .sig-line{ border-top:1.6px solid #141414; }
  .sig-role{
    font-family:'Barlow Semi Condensed', Arial, sans-serif;
    font-style:italic; font-weight:500;
    font-size:13.5px;
    letter-spacing:.3px;
    margin-top:4px;
    text-transform:uppercase;
    white-space:nowrap;
  }

  /* ===================== KONTAK ===================== */
  .contact{
    position:absolute;
    right:55px; bottom:17px;
    display:flex; gap:28px; align-items:center;
    font-family:'Barlow Semi Condensed', Arial, sans-serif;
    font-style:italic; font-weight:500;
    font-size:17px;
    z-index:2;
  }
  .contact .item{ display:flex; align-items:center; gap:7px; }
  .contact svg{ width:17px; height:17px; }

  /* ===================== PRINT ===================== */
  @page{ size:A4; margin:0; }
  @media print{
    body{ background:none; padding:0; }
    .page{ box-shadow:none; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- dekorasi garis kontur kanan-atas -->
  <svg class="deco-arcs" id="decoArcs" viewBox="0 0 330 345" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- dekorasi titik halftone kiri-bawah -->
  <svg class="deco-dots" id="decoDots" viewBox="0 0 470 150" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- watermark logo (otomatis tampil jika logo diisi) -->
  <img class="watermark" id="watermark" alt="">

  <div class="content">

    <!-- ============ HEADER ============ -->
    <div class="header">
      <div class="title">REPORT CARD</div>
      <div class="periode">PERIODE : <span id="periode"></span></div>
      <div class="logo-box" id="logoBox">
        <span class="logo-placeholder">LOGO</span>
      </div>
    </div>

    <!-- ============ DATA SISWA ============ -->
    <div class="student">
      <div class="photo-box" id="photoBox">
        <span class="photo-placeholder">FOTO</span>
      </div>
      <table class="info-table" id="infoTable"></table>
    </div>

    <!-- ============ TABEL SKILL ============ -->
    <div class="band">
      <table class="grid skill-table">
        <colgroup><col class="c-skill"><col class="c-criteria"></colgroup>
        <thead>
          <tr><th>SKILL</th><th>CRITERIA</th></tr>
        </thead>
        <tbody id="skillBody"></tbody>
      </table>

      <!-- ============ PERSONAL BEST TIME ============ -->
      <div class="section-title">PERSONAL BEST TIME</div>
      <table class="grid pbt-table">
        <colgroup>
          <col class="c-style"><col class="c-time"><col class="c-time"><col class="c-time">
        </colgroup>
        <thead>
          <tr><th>STYLE</th><th>25M</th><th>50M</th><th>100M</th></tr>
        </thead>
        <tbody id="pbtBody"></tbody>
      </table>

      <!-- ============ NOTE ============ -->
      <div class="note-label">NOTE :</div>
      <div class="note-box" id="noteBox"></div>
    </div>

    <!-- ============ STATISTIK ============ -->
    <div class="stats">
      <div class="col">
        <div class="stat-row"><div class="k">Attendance</div><div class="v" id="attendance"></div></div>
        <div class="stat-row"><div class="k">Personality</div><div class="v" id="personality"></div></div>
      </div>
      <div class="col right">
        <div class="stat-row"><div class="k">Motivation to learn</div><div class="v" id="motivation"></div></div>
        <div class="stat-row"><div class="k">Learning Achievements</div><div class="v" id="achievement"></div></div>
      </div>
    </div>

    <!-- ============ TANDA TANGAN ============ -->
    <div class="signatures">
      <div class="sig-block one">
        <div class="sig-space" id="sig1Img"></div>
        <div class="sig-name" id="sig1Name"></div>
        <div class="sig-line"></div>
        <div class="sig-role" id="sig1Role"></div>
      </div>
      <div class="sig-block two">
        <div class="sig-space" id="sig2Img"></div>
        <div class="sig-name" id="sig2Name"></div>
        <div class="sig-line"></div>
        <div class="sig-role" id="sig2Role"></div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- ============ KONTAK ============ -->
  <div class="contact">
    <div class="item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#141414" stroke-width="1.9">
        <rect x="3" y="3" width="18" height="18" rx="5"/>
        <circle cx="12" cy="12" r="4.2"/>
        <circle cx="17.2" cy="6.8" r="1.15" fill="#141414" stroke="none"/>
      </svg>
      <span id="instagram"></span>
    </div>
    <div class="item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#141414" stroke-width="1.9">
        <rect x="2.5" y="5" width="19" height="14" rx="2"/>
        <path d="M3.5 6.5 12 13l8.5-6.5"/>
      </svg>
      <span id="email"></span>
    </div>
  </div>

</div><!-- /page -->

<script>
/* ============================================================
   DATA — UBAH ISI REPORT CARD DI SINI
   ============================================================ */
const DATA = {
  periode: "JANUARY-JUNE 26",

  // Gambar: isi dengan nama file / URL (mis. "logo.png") atau base64.
  // Kosongkan ("") untuk menampilkan placeholder.
  logoImage:      "",   // logo di kotak hitam kanan-atas (juga dipakai watermark)
  photoImage:     "",   // foto siswa
  signatureImage: "",   // tanda tangan di blok kanan

  student: {
    "ID NUMBER": "NEXT.001.SW.26",
    "FULL NAME": "AMMABELE",
    "AGE":       "12",
    "LEVEL":     "WAVE",
    "CLASS":     "REGULAR",
    "LOCATION":  "ARCICI SPORT CENTRE"
  },

  skills: [
    { skill: "WATER ADAPTATION",        criteria: "ADVANCE"    },
    { skill: "FRONT AND BACK FLOATING", criteria: "GOOD"       },
    { skill: "STREAMLINE GLIDING",      criteria: "GOOD"       },
    { skill: "FLUTTER KICK",            criteria: "SATISFYING" },
    { skill: "BASIC FREESTYLE",         criteria: "EMERGING"   }
  ],

  bestTimes: [
    { style: "FREESTYLE",    m25: "NT", m50: "NT", m100: "NT" },
    { style: "BACKSTROKE",   m25: "NT", m50: "NT", m100: "NT" },
    { style: "BREASTSTROKE", m25: "NT", m50: "NT", m100: "NT" },
    { style: "BUTTERFLY",    m25: "NT", m50: "NT", m100: "NT" }
  ],

  note: "",

  attendance:  "100%",
  personality: "Good",
  motivation:  "Good",
  achievement: "Satisfying",

  signature1: { name: "Full Name",     role: "HEAD COACH" },
  signature2: { name: "Syahril Sidik", role: "HEAD OF NEXT SWIMMING" },

  instagram: "@nextswim",
  email:     "nextcanswim@gmail.com"
};

/* ============================================================
   RENDER — tidak perlu diubah
   ============================================================ */
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function render(){
  document.getElementById('periode').textContent = DATA.periode;

  if (DATA.logoImage){
    document.getElementById('logoBox').innerHTML = '<img src="'+esc(DATA.logoImage)+'" alt="logo">';
    const wm = document.getElementById('watermark');
    wm.src = DATA.logoImage;
    wm.style.display = 'block';
  }
  if (DATA.photoImage){
    document.getElementById('photoBox').innerHTML = '<img src="'+esc(DATA.photoImage)+'" alt="foto">';
  }
  if (DATA.signatureImage){
    document.getElementById('sig2Img').innerHTML = '<img src="'+esc(DATA.signatureImage)+'" alt="ttd">';
  }

  document.getElementById('infoTable').innerHTML =
    Object.entries(DATA.student)
      .map(([k,v]) => '<tr><td class="lbl">'+esc(k)+'</td><td class="val">'+esc(v)+'</td></tr>')
      .join('');

  document.getElementById('skillBody').innerHTML =
    DATA.skills.map(r => '<tr><td>'+esc(r.skill)+'</td><td>'+esc(r.criteria)+'</td></tr>').join('');

  document.getElementById('pbtBody').innerHTML =
    DATA.bestTimes.map(r =>
      '<tr><td>'+esc(r.style)+'</td><td>'+esc(r.m25)+'</td><td>'+esc(r.m50)+'</td><td>'+esc(r.m100)+'</td></tr>'
    ).join('');

  document.getElementById('noteBox').textContent      = DATA.note;
  document.getElementById('attendance').textContent   = DATA.attendance;
  document.getElementById('personality').textContent  = DATA.personality;
  document.getElementById('motivation').textContent   = DATA.motivation;
  document.getElementById('achievement').textContent  = DATA.achievement;

  document.getElementById('sig1Name').textContent = DATA.signature1.name;
  document.getElementById('sig1Role').textContent = DATA.signature1.role;
  document.getElementById('sig2Name').textContent = DATA.signature2.name;
  document.getElementById('sig2Role').textContent = DATA.signature2.role;

  document.getElementById('instagram').textContent = DATA.instagram;
  document.getElementById('email').textContent     = DATA.email;
}

/* ---------- dekorasi: garis kontur konsentris di sekitar kotak logo ---------- */
function drawArcs(){
  const svg = document.getElementById('decoArcs');
  // svg menempati x 464..794 dari halaman; kotak logo: x 520..773, tinggi 130
  const cx = 646 - 464;   // pusat = tengah kotak logo
  const cy = 63;
  // hanya sektor kanan-bawah kotak logo yang terlihat (seperti desain asli)
  let html = '<defs><clipPath id="arcClip">'
           +   '<polygon points="182,63 96,290 330,290 330,0 308,0"/>'
           + '</clipPath></defs><g clip-path="url(#arcClip)">';
  for (let i = 0; i < 33; i++){
    const r = 80 + i * 6;
    html += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke="#155689" stroke-width="0.7" fill="none"/>';
  }
  svg.innerHTML = html + '</g>';
}

/* ---------- dekorasi: titik halftone bergelombang di kiri-bawah ---------- */
function drawDots(){
  const svg = document.getElementById('decoDots');
  const W = 470, H = 150;
  let html = '';
  const step = 10.5;
  for (let y = step/2; y < H; y += step){
    for (let x = step/2; x < W; x += step){
      // batas atas berupa kurva menurun dari kiri ke kanan
      const boundary = 18 + 128 * Math.pow(x / W, 1.5) + 7 * Math.sin(x / 34);
      if (y > boundary){
        const d = Math.hypot(x / W, 1 - y / H);      // jarak dari sudut kiri-bawah
        const r = 3.1 - d * 3.9;
        if (r > 0.45){
          html += '<circle cx="'+x+'" cy="'+y+'" r="'+Math.min(r,3.1).toFixed(2)+'" fill="#155689"/>';
        }
      }
    }
  }
  svg.innerHTML = html;
}

render();
drawArcs();
drawDots();
</script>
</body>
</html>
